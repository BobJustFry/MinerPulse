<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miner Pulse Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <h1>Miner Pulse Admin</h1>
    <section id="login" class="card">
      <form id="login-form">
        <input type="email" name="email" placeholder="Admin email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Войти</button>
      </form>
    </section>
    <section id="panel" hidden>
      <nav class="tabs">
        <button data-tab="users">Клиенты</button>
        <button data-tab="plans">Тарифы</button>
        <button data-tab="subs">Подписки</button>
        <button data-tab="audit">Audit</button>
        <button id="logout">Выход</button>
      </nav>
      <div id="content" class="card"></div>
    </section>
  </main>
  <script>window.MPULSE_API = "__PUBLIC_API_URL__";</script>
  <script src="/admin.js"></script>
</body>
</html>
